<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Los Tipines — El Juego</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- El juego vive DENTRO de una tele CRT -->
  <div class="tv">
    <div class="tv-body">
      <div class="tv-screen">
        <div class="screen-area">
          <!-- Pantalla de inicio -->
          <section id="title" class="screen">
            <div class="title-card">
              <h1 class="logo">LOS TIPINES</h1>
              <p class="logo-sub">EL JUEGO</p>
              <button id="btn-jugar" class="btn">JUGAR</button>
              <p class="hint">Enter o clic para empezar</p>
            </div>
          </section>

          <!-- Selección de personaje: diorama + cajas de stats al pasar el mouse -->
          <section id="select" class="screen hidden">
            <div class="sel-left">
              <h2 class="select-title">ELEGÍ TU<br>TIPÍN</h2>
              <div id="statbox" class="statbox"></div>
              <p class="hint">Pasá el mouse o ← → · Enter para elegir</p>
            </div>
            <div class="sel-right">
              <img class="diorama" src="assets/pantallas/seleccion/1.png" alt="Los Tipines">
              <button class="hot" data-i="2" style="--c:var(--rojo);     left:1%;  width:36%"></button>
              <button class="hot" data-i="0" style="--c:var(--marron);   left:33%; width:33%"></button>
              <button class="hot" data-i="1" style="--c:var(--amarillo); left:62%; width:37%"></button>
            </div>
          </section>

          <!-- Gameplay -->
          <canvas id="game" class="hidden" width="960" height="540"></canvas>
        </div>
        <div class="glass"></div><!-- reflejo + vidrio curvo -->
      </div>

      <!-- Panel de controles a la derecha -->
      <aside class="tv-panel">
        <div class="brand">TIPI<span>VISIÓN</span></div>
        <div class="dial"><div class="knob"></div></div>
        <div class="dial"><div class="knob small"></div></div>
        <button class="power" title="power"><i class="led"></i></button>
        <div class="grille"></div>
      </aside>

      <i class="screw tl"></i><i class="screw tr"></i><i class="screw bl"></i><i class="screw br"></i>
    </div>
    <div class="tv-stand"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
